<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1d27"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="32" y1="24" x2="96" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6b21a8"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="24" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Pi symbol stylized -->
  <g transform="translate(64,58)">
    <!-- Horizontal bar -->
    <rect x="-30" y="-22" width="60" height="6" rx="3" fill="#f59e0b"/>
    <!-- Left leg -->
    <rect x="-22" y="-18" width="6" height="40" rx="3" fill="#f59e0b"/>
    <!-- Right leg -->
    <rect x="16" y="-18" width="6" height="34" rx="3" fill="#f59e0b"/>
    <!-- Right leg curve -->
    <path d="M22 14 Q22 22 14 22" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" fill="none"/>
  </g>
  <!-- Payment check badge -->
  <circle cx="96" cy="88" r="16" fill="#22c55e"/>
  <path d="M88 88 L93 93 L104 82" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- PP text -->
  <text x="64" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="2">PPTESTER</text>
</svg>
